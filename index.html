<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Daybook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5efe4;
    --bg-raised: #fdf8ed;
    --bg-card: #ffffff;
    --border: #e8dfce;
    --border-soft: #f1e8d6;
    --text: #2d241a;
    --text-dim: #6b5f50;
    --text-muted: #9a8e7e;
    --accent: #c96e48;
    --accent-soft: #f4e2d5;
    --accent-deep: #a85636;
    --blue: #5a7e8a;
    --sage: #7a8b5e;
    --shadow-soft: 0 1px 2px rgba(45, 36, 26, 0.04), 0 4px 12px rgba(45, 36, 26, 0.04);
    --shadow-hover: 0 2px 4px rgba(45, 36, 26, 0.06), 0 12px 28px rgba(45, 36, 26, 0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Manrope', -apple-system, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }
  body {
    background-image:
      radial-gradient(ellipse at top left, rgba(201, 110, 72, 0.05) 0%, transparent 45%),
      radial-gradient(ellipse at bottom right, rgba(122, 139, 94, 0.04) 0%, transparent 45%);
    background-attachment: fixed;
  }
  a { color: inherit; text-decoration: none; }

  /* ───── Masthead ───── */
  .masthead {
    padding: 2rem 1.75rem 1.25rem;
    max-width: 1600px;
    margin: 0 auto;
  }
  .brand-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 1rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1rem;
  }
  .brand h1 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-style: italic;
    font-size: clamp(2rem, 4vw, 2.75rem);
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--text);
  }
  .brand h1 .amp {
    color: var(--accent);
    font-style: normal;
  }
  .subtitle {
    font-family: 'Fraunces', serif;
    font-size: 0.95rem;
    color: var(--text-dim);
    margin-top: 0.4rem;
    letter-spacing: 0.01em;
  }
  .stamp {
    font-family: 'Fraunces', serif;
    font-size: 0.85rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-feature-settings: 'smcp';
    text-align: right;
  }
  .stamp .clock {
    display: block;
    font-size: 0.9rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    margin-top: 0.2rem;
  }

  .controls {
    display: flex;
    gap: 0.6rem;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 1rem;
  }
  .btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 0.45rem 0.9rem;
    font-family: 'Manrope', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    letter-spacing: 0;
    cursor: pointer;
    transition: all 0.2s ease;
    border-radius: 999px;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  .btn.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent-deep); }

  /* ───── Main ───── */
  main { padding: 0 1.75rem 2rem; max-width: 1600px; margin: 0 auto; }

  /* ───── Launch hero ───── */
  .launch-hero {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin: 1.5rem 0 2rem;
    overflow: hidden;
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    box-shadow: var(--shadow-soft);
  }
  .launch-hero.no-image { grid-template-columns: 1fr; }
  .launch-body { padding: 1.75rem; }
  .launch-image {
    background-size: cover;
    background-position: center;
    min-height: 260px;
    background-color: var(--bg-raised);
  }
  .launch-label {
    font-family: 'Fraunces', serif;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.6rem;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
  }
  .launch-label::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: breathe 2.4s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }
  .launch-name {
    font-family: 'Fraunces', serif;
    font-size: 1.85rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1.15;
    margin-bottom: 1rem;
  }
  .launch-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem 1.25rem;
    font-size: 0.85rem;
    color: var(--text-dim);
  }
  .launch-meta strong { color: var(--text); font-weight: 600; }
  .countdown {
    font-family: 'Fraunces', serif;
    font-size: 1.65rem;
    font-weight: 500;
    color: var(--accent-deep);
    letter-spacing: 0;
    margin-top: 1.25rem;
    font-feature-settings: 'tnum';
  }
  .countdown.elapsed { color: var(--text-muted); }
  .launch-empty {
    font-family: 'Fraunces', serif;
    font-style: italic;
    color: var(--text-dim);
    font-size: 1.1rem;
  }
  .upcoming {
    margin-top: 1.25rem;
    padding-top: 1rem;
    border-top: 1px dashed var(--border);
    display: flex;
    flex-direction: column;
    gap: 0.45rem;
  }
  .upcoming-item {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    font-size: 0.82rem;
    color: var(--text-dim);
  }
  .upcoming-item .u-name { color: var(--text); }

  @media (max-width: 720px) {
    .launch-hero { grid-template-columns: 1fr; }
    .launch-image { min-height: 200px; }
  }

  /* ───── Grid ───── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
    gap: 1.25rem;
  }

  /* ───── Section ───── */
  .section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    max-height: 680px;
    box-shadow: var(--shadow-soft);
  }
  .section-head {
    padding: 1.1rem 1.25rem 0.85rem;
    border-bottom: 1px solid var(--border-soft);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 1rem;
  }
  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 1.4rem;
    font-weight: 400;
    letter-spacing: -0.01em;
    font-style: italic;
  }
  .section-title .num {
    font-family: 'Manrope', sans-serif;
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-left: 0.6rem;
    font-weight: 500;
    font-style: normal;
    letter-spacing: 0.05em;
  }
  .section-tag {
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .items {
    overflow-y: auto;
    flex: 1;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .items::-webkit-scrollbar { width: 6px; }
  .items::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .item {
    padding: 0.95rem 1.25rem;
    border-bottom: 1px solid var(--border-soft);
    display: flex;
    gap: 0.9rem;
    transition: background 0.15s ease;
  }
  .item:last-child { border-bottom: none; }
  .item:hover { background: var(--bg-raised); }
  .item-thumb {
    width: 76px;
    height: 76px;
    flex-shrink: 0;
    background-size: cover;
    background-position: center;
    background-color: var(--accent-soft);
    border-radius: 4px;
  }
  .item-body { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: space-between; }
  .item-title {
    color: var(--text);
    font-size: 0.95rem;
    font-weight: 500;
    line-height: 1.35;
    margin-bottom: 0.35rem;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .item:hover .item-title { color: var(--accent-deep); }
  .item-meta {
    font-size: 0.72rem;
    color: var(--text-muted);
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
  }
  .item-meta .source {
    color: var(--sage);
    font-weight: 600;
    font-family: 'Fraunces', serif;
    font-style: italic;
  }

  .loading, .error, .empty {
    padding: 2rem 1.25rem;
    text-align: center;
    color: var(--text-muted);
    font-size: 0.85rem;
    font-family: 'Fraunces', serif;
    font-style: italic;
  }
  .error { color: var(--accent-deep); }

  .footer {
    padding: 2rem 1.75rem 3rem;
    text-align: center;
    color: var(--text-muted);
    font-size: 0.8rem;
    font-family: 'Fraunces', serif;
    font-style: italic;
    max-width: 1600px;
    margin: 0 auto;
  }
  .footer a { color: var(--text-dim); border-bottom: 1px dotted var(--border); font-style: normal; font-family: 'Manrope', sans-serif; font-size: 0.78rem; }

  @media (max-width: 600px) {
    .masthead { padding: 1.25rem 1rem 0.75rem; }
    main { padding: 0 1rem 1.5rem; }
    .launch-body { padding: 1.25rem; }
    .launch-name { font-size: 1.4rem; }
    .countdown { font-size: 1.3rem; }
    .item-thumb { width: 64px; height: 64px; }
    .section { max-height: 560px; }
  }
</style>
</head>
<body>
  <header class="masthead">
    <div class="brand-row">
      <div class="brand">
        <h1>The Daybook<span class="amp">.</span></h1>
        <p class="subtitle" id="subtitle">Good morning.</p>
      </div>
      <div class="stamp">
        <span id="dateline">— · —</span>
        <span class="clock" id="clock">--:--</span>
      </div>
    </div>
    <div class="controls">
      <button class="btn active" id="toggle-politics">Politics filter · on</button>
      <button class="btn" id="refresh">Refresh</button>
    </div>
  </header>

  <main>
    <section class="launch-hero" id="launch-hero">
      <div class="launch-body">
        <div class="launch-label">Next Vandenberg launch</div>
        <div class="loading">Checking the pad…</div>
      </div>
    </section>

    <div class="grid" id="grid"></div>
  </main>

  <footer class="footer">
    Gathered from Hacker News, The Space Devs, and a small shelf of RSS feeds. &nbsp;·&nbsp;
    <a href="#" onclick="location.reload();return false;">refresh the page</a>
  </footer>

<script>
// ─── Config ──────────────────────────────────────────────────
const POLITICS_KEYWORDS = [
  'trump','biden','harris','vance','pelosi','schumer','mcconnell',
  'congress','senate','senator','house vote','lawmaker','legislat',
  'election','ballot','voter','voting','primary race','midterm',
  'democrat','republican',' gop ','gop,','gop.','gop:',
  'politic','political','partisan','white house','capitol hill',
  'supreme court','scotus','impeach','filibuster','shutdown deal',
  'congresswoman','congressman'
];

const SECTIONS = [
  { id: 'tech', title: 'Tech', tag: 'Hacker News', type: 'hn' },
  { id: 'science', title: 'Science', tag: 'ScienceDaily · Phys.org', type: 'rss',
    feeds: [
      'https://www.sciencedaily.com/rss/top/science.xml',
      'https://phys.org/rss-feed/'
    ]},
  { id: 'space', title: 'Space', tag: 'Space.com · NASA', type: 'rss',
    feeds: [
      'https://www.space.com/feeds/all',
      'https://www.nasa.gov/feeds/iotd-feed/'
    ]},
  { id: 'california', title: 'California', tag: 'LA Times · SF Chronicle', type: 'rss',
    feeds: [
      'https://www.latimes.com/california/rss2.0.xml',
      'https://www.sfchronicle.com/rss/feed/Bay-Area-News-429.php'
    ]},
  { id: 'local', title: 'Woodland Hills & Calabasas', tag: 'The Acorn · Daily News · Patch', type: 'rss',
    feeds: [
      'https://www.theacorn.com/feed/',
      'https://www.dailynews.com/location/california/los-angeles-county/san-fernando-valley/feed/',
      'https://patch.com/california/woodlandhills/rss.xml',
      'https://patch.com/california/calabasas/rss.xml'
    ]}
];

const RSS2JSON = 'https://api.rss2json.com/v1/api.json?rss_url=';

let filterPolitics = true;
let nextLaunchDate = null;

// ─── Helpers ─────────────────────────────────────────────────
function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function isPolitical(t) {
  if (!t) return false;
  const s = t.toLowerCase();
  return POLITICS_KEYWORDS.some(k => s.includes(k));
}
function timeAgo(d) {
  if (!d) return '';
  const dt = new Date(d);
  if (isNaN(dt)) return '';
  const s = Math.floor((Date.now() - dt.getTime()) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + ' min ago';
  if (s < 86400) return Math.floor(s/3600) + ' hr ago';
  const days = Math.floor(s/86400);
  return days === 1 ? 'yesterday' : days + ' days ago';
}
function domain(url) {
  try { return new URL(url).hostname.replace(/^www\./, ''); } catch { return ''; }
}
function extractImage(item) {
  // rss2json exposes thumbnail and enclosure — fall back to parsing HTML
  if (item.thumbnail && /^https?:/.test(item.thumbnail)) return item.thumbnail;
  const enc = item.enclosure;
  if (enc && enc.link) {
    if (enc.type && enc.type.startsWith('image/')) return enc.link;
    if (/\.(jpe?g|png|gif|webp)(\?|$)/i.test(enc.link)) return enc.link;
  }
  const html = item.description || item.content || '';
  const m = html.match(/<img[^>]+src=["']([^"']+)["']/i);
  if (m) return m[1];
  return null;
}

// ─── Header niceties ─────────────────────────────────────────
function greeting() {
  const h = new Date().getHours();
  if (h < 5) return 'Working late.';
  if (h < 12) return 'Good morning.';
  if (h < 17) return 'Good afternoon.';
  if (h < 21) return 'Good evening.';
  return 'Quiet night.';
}
function dateline() {
  return new Date().toLocaleDateString('en-US',
    { weekday:'long', month:'long', day:'numeric' });
}
function updateClock() {
  const d = new Date();
  const h = d.getHours() % 12 || 12;
  const m = String(d.getMinutes()).padStart(2, '0');
  const ampm = d.getHours() >= 12 ? 'pm' : 'am';
  document.getElementById('clock').textContent = `${h}:${m} ${ampm}`;
}
function updateHeader() {
  document.getElementById('subtitle').textContent = greeting() + ' For Mike.';
  document.getElementById('dateline').textContent = dateline();
  updateClock();
}
setInterval(updateClock, 30000);
updateHeader();

// ─── Launch countdown ────────────────────────────────────────
function renderCountdown() {
  if (!nextLaunchDate) return;
  const el = document.getElementById('countdown');
  if (!el) return;
  const diff = nextLaunchDate.getTime() - Date.now();
  if (diff <= 0) { el.classList.add('elapsed'); el.textContent = 'Liftoff window open.'; return; }
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  const parts = [];
  if (d) parts.push(d + (d === 1 ? ' day' : ' days'));
  if (d || h) parts.push(h + ' hr');
  parts.push(m + ' min');
  if (!d) parts.push(s + ' sec');
  el.textContent = 'in ' + parts.join(' · ');
}
setInterval(renderCountdown, 1000);

async function loadLaunches() {
  const hero = document.getElementById('launch-hero');
  try {
    const res = await fetch('https://ll.thespacedevs.com/2.2.0/launch/upcoming/?limit=50');
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    const vandy = (data.results || []).filter(l => {
      const loc = (l.pad?.location?.name || '').toLowerCase();
      return loc.includes('vandenberg');
    });

    if (vandy.length === 0) {
      hero.classList.add('no-image');
      hero.innerHTML = `
        <div class="launch-body">
          <div class="launch-label">Next Vandenberg launch</div>
          <div class="launch-empty">Nothing on the pad at the moment — the coast is quiet.</div>
        </div>`;
      return;
    }

    const next = vandy[0];
    nextLaunchDate = new Date(next.net);
    const img = typeof next.image === 'object' ? next.image?.image_url : next.image;
    const rocket = next.name || 'Unknown mission';
    const provider = next.launch_service_provider?.name || '';
    const pad = next.pad?.name || '';
    const status = next.status?.name || '';
    const when = nextLaunchDate.toLocaleString('en-US',
      { weekday:'long', month:'long', day:'numeric',
        hour:'numeric', minute:'2-digit', timeZoneName:'short' });

    const upcomingHtml = vandy.length > 1
      ? `<div class="upcoming">` +
        vandy.slice(1, 5).map(l => {
          const ds = new Date(l.net).toLocaleDateString('en-US', { month:'short', day:'numeric' });
          return `<div class="upcoming-item"><span class="u-name">${escapeHtml(l.name)}</span><span>${ds}</span></div>`;
        }).join('') + `</div>`
      : '';

    hero.classList.toggle('no-image', !img);
    hero.innerHTML = `
      <div class="launch-body">
        <div class="launch-label">Next Vandenberg launch</div>
        <div class="launch-name">${escapeHtml(rocket)}</div>
        <div class="launch-meta">
          ${provider ? `<span><strong>${escapeHtml(provider)}</strong></span>` : ''}
          ${pad ? `<span>from ${escapeHtml(pad)}</span>` : ''}
          ${status ? `<span>${escapeHtml(status)}</span>` : ''}
        </div>
        <div class="launch-meta" style="margin-top:0.35rem;"><span>${escapeHtml(when)}</span></div>
        <div class="countdown" id="countdown">calculating…</div>
        ${upcomingHtml}
      </div>
      ${img ? `<div class="launch-image" style="background-image:url('${escapeHtml(img)}')"></div>` : ''}
    `;
    renderCountdown();
  } catch (e) {
    hero.classList.add('no-image');
    hero.innerHTML = `
      <div class="launch-body">
        <div class="launch-label">Next Vandenberg launch</div>
        <div class="error">Couldn't reach the launch feed. Try refreshing in a moment.</div>
      </div>`;
  }
}

// ─── News fetchers ───────────────────────────────────────────
async function fetchHN() {
  const res = await fetch('https://hn.algolia.com/api/v1/search?tags=front_page&hitsPerPage=30');
  if (!res.ok) throw new Error('HN ' + res.status);
  const data = await res.json();
  return (data.hits || []).map(h => ({
    title: h.title,
    link: h.url || `https://news.ycombinator.com/item?id=${h.objectID}`,
    date: h.created_at,
    source: h.url ? domain(h.url) : 'news.ycombinator.com',
    image: null,
    points: h.points
  }));
}

async function fetchRSS(url) {
  const res = await fetch(RSS2JSON + encodeURIComponent(url));
  if (!res.ok) throw new Error('RSS ' + res.status);
  const data = await res.json();
  if (data.status !== 'ok') return [];
  return (data.items || []).map(i => ({
    title: i.title,
    link: i.link,
    date: i.pubDate,
    source: data.feed?.title || domain(i.link),
    image: extractImage(i),
    description: i.description || ''
  }));
}

async function fetchSection(section) {
  if (section.type === 'hn') return fetchHN();
  const results = await Promise.allSettled(section.feeds.map(fetchRSS));
  const items = [];
  for (const r of results) if (r.status === 'fulfilled') items.push(...r.value);
  items.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
  const seen = new Set();
  return items.filter(i => {
    const k = (i.title || '').toLowerCase().trim();
    if (!k || seen.has(k)) return false;
    seen.add(k); return true;
  });
}

function renderItems(section, items) {
  const filtered = filterPolitics
    ? items.filter(i => !isPolitical(i.title) && !isPolitical(i.description))
    : items;
  const top = filtered.slice(0, 25);
  if (top.length === 0) return '<div class="empty">Nothing to surface right now.</div>';

  return top.map(i => {
    const thumb = i.image
      ? `<div class="item-thumb" style="background-image:url('${escapeHtml(i.image)}')"></div>`
      : '';
    const metaParts = [];
    if (i.source) metaParts.push(`<span class="source">${escapeHtml(i.source)}</span>`);
    if (i.date) metaParts.push(`<span>${escapeHtml(timeAgo(i.date))}</span>`);
    if (i.points !== undefined) metaParts.push(`<span>▲ ${i.points}</span>`);
    return `
      <a class="item" href="${escapeHtml(i.link)}" target="_blank" rel="noopener">
        ${thumb}
        <div class="item-body">
          <div class="item-title">${escapeHtml(i.title)}</div>
          <div class="item-meta">${metaParts.join('')}</div>
        </div>
      </a>`;
  }).join('');
}

async function loadSection(section) {
  const el = document.getElementById('section-' + section.id);
  if (!el) return;
  const itemsEl = el.querySelector('.items');
  itemsEl.innerHTML = '<div class="loading">Gathering stories…</div>';
  try {
    const items = await fetchSection(section);
    section._items = items;
    itemsEl.innerHTML = renderItems(section, items);
    updateCount(section);
  } catch (e) {
    itemsEl.innerHTML = `<div class="error">Couldn't reach this feed.</div>`;
  }
}

function updateCount(section) {
  const el = document.getElementById('section-' + section.id);
  if (!el || !section._items) return;
  const filtered = filterPolitics
    ? section._items.filter(i => !isPolitical(i.title) && !isPolitical(i.description))
    : section._items;
  const shown = Math.min(filtered.length, 25);
  const numEl = el.querySelector('.num');
  if (numEl) numEl.textContent = `${shown} stories`;
}

function buildSections() {
  document.getElementById('grid').innerHTML = SECTIONS.map(s => `
    <section class="section" id="section-${s.id}">
      <div class="section-head">
        <h2 class="section-title">${escapeHtml(s.title)}<span class="num">loading</span></h2>
        <span class="section-tag">${escapeHtml(s.tag)}</span>
      </div>
      <div class="items"><div class="loading">One moment…</div></div>
    </section>
  `).join('');
}

function rerenderAll() {
  for (const s of SECTIONS) {
    if (!s._items) continue;
    const el = document.getElementById('section-' + s.id);
    if (el) el.querySelector('.items').innerHTML = renderItems(s, s._items);
    updateCount(s);
  }
}

async function loadAll() {
  loadLaunches();
  for (const s of SECTIONS) loadSection(s);
}

// ─── Controls ────────────────────────────────────────────────
document.getElementById('toggle-politics').addEventListener('click', e => {
  filterPolitics = !filterPolitics;
  e.target.textContent = `Politics filter · ${filterPolitics ? 'on' : 'off'}`;
  e.target.classList.toggle('active', filterPolitics);
  rerenderAll();
});
document.getElementById('refresh').addEventListener('click', loadAll);

// ─── Boot ────────────────────────────────────────────────────
buildSections();
loadAll();
setInterval(loadAll, 15 * 60 * 1000);
</script>
</body>
</html>
